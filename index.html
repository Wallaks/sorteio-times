<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1fa86a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fut7 Sorteio" />
    <title>Pelada Fut7 — Sorteio</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
    <link rel="apple-touch-icon" href="./icons/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Pelada — Sorteio de Times</h1>
      </header>

      <section class="card" aria-labelledby="paste-title">
        <h2 id="paste-title">Lista do grupo</h2>
        <div class="row">
          <button type="button" class="btn-primary" id="btnCopyTemplate">Copiar modelo (WhatsApp)</button>
        </div>
        <textarea
          id="pasteList"
          class="paste-area"
          placeholder="Cole aqui a lista que voltou do grupo…"
          autocomplete="off"
        ></textarea>
        <div class="row" style="margin-top: 0.65rem">
          <button type="button" class="btn-primary" id="btnPasteImport">Importar lista</button>
        </div>
      </section>

      <section class="card" aria-labelledby="cadastro-title">
        <h2 id="cadastro-title">Ou adicionar um por um <span class="count-badge" id="playerCount">0</span></h2>
        <div class="row">
          <input type="text" id="playerName" placeholder="Nome" autocomplete="off" maxlength="80" />
          <label class="chk-wrap">
            <input type="checkbox" id="canGK" />
            Gol
          </label>
          <button type="button" class="btn-primary" id="btnAdd">Adicionar</button>
        </div>
        <ul class="players-list" id="playersList" aria-live="polite"></ul>
        <p class="empty-hint" id="emptyHint">Nenhum jogador ainda.</p>
      </section>

      <section class="card" aria-labelledby="config-title">
        <h2 id="config-title">Sorteio</h2>
        <div class="row config-row">
          <label for="listaMax">Tamanho da lista</label>
          <input type="number" id="listaMax" min="1" max="40" value="18" />
          <label for="perTeam">Por time</label>
          <input type="number" id="perTeam" min="1" max="11" value="7" />
        </div>
        <div class="row" style="margin-top: 0.75rem">
          <button type="button" class="btn-primary" id="btnDraw">Sortear</button>
          <button type="button" class="btn-ghost" id="btnClearTeams">Limpar sorteio</button>
        </div>
        <div class="footer-actions">
          <button type="button" class="btn-ghost" id="btnClearPlayers">Limpar jogadores</button>
        </div>
        <div id="message" hidden class="msg"></div>
        <ul id="warningsBlock" class="warnings-list" hidden></ul>
      </section>

      <section class="card" id="resultsSection" hidden aria-labelledby="results-title">
        <h2 id="results-title">Resultado</h2>
        <div class="result-actions row">
          <button type="button" class="btn-primary" id="btnCopy">Copiar texto p/ WhatsApp</button>
        </div>

        <div class="subblock">
          <h3>Lista (número da “pedra”)</h3>
          <ul class="num-list" id="listaNumerada"></ul>
        </div>

        <div class="teams-grid" id="teamsGrid"></div>

        <div class="subblock" id="reservasBlock" hidden>
          <h3>Reservas da lista</h3>
          <ul class="num-list" id="reservasList"></ul>
        </div>

        <div class="subblock" id="supletesBlock" hidden>
          <h3>Supletes</h3>
          <ul class="num-list" id="supletesList"></ul>
        </div>
      </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
